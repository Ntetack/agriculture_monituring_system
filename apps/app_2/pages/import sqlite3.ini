# ─────────────────────────────────────────
# CROP CYCLES  (2-3 par champ, mix passé/en cours)
# ─────────────────────────────────────────
# Base yields (t/ha) per crop with variance
base_yields = {1:3.2, 2:5.1, 3:5.8, 4:4.0, 5:2.8, 6:2.2, 7:1.9, 8:7.5}

cycle_rows = []
for field_id in range(1, 19):
    area = areas[field_id - 1]
    # Cycle 1: completed ~2 seasons ago
    crop1 = random.randint(1, 8)
    planting1 = START - timedelta(days=random.randint(200, 300))
    harvest_days1 = crops[crop1 - 1][5]
    expected1 = planting1 + timedelta(days=harvest_days1)
    actual1    = expected1 + timedelta(days=random.randint(-5, 8))
    yph1 = base_yields[crop1] * random.uniform(0.85, 1.15)
    cycle_rows.append((field_id, crop1,
                       d(planting1), d(expected1), d(actual1),
                       round(yph1 * area, 2), "Completed"))

    # Cycle 2: completed last season
    crop2 = random.randint(1, 8)
    planting2 = START - timedelta(days=random.randint(60, 160))
    harvest_days2 = crops[crop2 - 1][5]
    expected2 = planting2 + timedelta(days=harvest_days2)
    if expected2 < NOW - timedelta(days=10):
        actual2 = expected2 + timedelta(days=random.randint(-3, 10))
        yph2 = base_yields[crop2] * random.uniform(0.80, 1.20)
        status2 = "Completed"
        cycle_rows.append((field_id, crop2,
                           d(planting2), d(expected2), d(actual2),
                           round(yph2 * area, 2), status2))
    else:
        # Still growing
        yph2 = None
        actual2 = None
        status2 = "Growing"
        cycle_rows.append((field_id, crop2,
                           d(planting2), d(expected2), None, None, status2))

cur.executemany(
    "INSERT INTO CropCycles(fieldId,cropId,plantingDate,expectedHarvestDate,"
    "actualHarvestDate,yieldTons,status) VALUES(?,?,?,?,?,?,?)",
    cycle_rows
)
print(f" {len(cycle_rows)} cycles de culture insérés.")

# ─────────────────────────────────────────
# IOT DEVICES  (2-3 par champ)
# ─────────────────────────────────────────
device_types = [
    ("Soil Moisture Sensor", "SM", "soil_moisture", "%"),
    ("Temperature Sensor",   "TS", "temperature",   "°C"),
    ("pH Sensor",            "PH", "soil_ph",        "pH"),
    ("Weather Station",      "WS", "humidity",       "%"),
]

devices = []
# field_id → list of (device_db_id, metric_type, unit)
field_devices: dict[int, list] = {}

serial_counter = 1000
for field_id in range(1, 19):
    assigned = []
    # Always: moisture + temperature
    for dtype_idx in [0, 1]:
        dtype, prefix, metric, unit = device_types[dtype_idx]
        serial = f"{prefix}-{serial_counter:05d}"
        serial_counter += 1
        fw = f"v{random.randint(1,2)}.{random.randint(0,3)}.{random.randint(0,9)}"
        status = "Active" if random.random() > 0.05 else "Maintenance"
        devices.append((field_id, dtype, serial, fw, f"PUBKEY-{serial}", dt(NOW, minutes=-random.randint(0,30)), status))
        assigned.append((len(devices), metric, unit))  # 1-indexed
    # 1-in-2 chance: add pH or weather station
    if random.random() > 0.5:
        dtype_idx = random.choice([2, 3])
        dtype, prefix, metric, unit = device_types[dtype_idx]
        serial = f"{prefix}-{serial_counter:05d}"
        serial_counter += 1
        fw = f"v{random.randint(1,2)}.{random.randint(0,3)}.{random.randint(0,9)}"
        status = "Active" if random.random() > 0.08 else "Inactive"
        devices.append((field_id, dtype, serial, fw, f"PUBKEY-{serial}", dt(NOW, minutes=-random.randint(0,60)), status))
        assigned.append((len(devices), metric, unit))
    field_devices[field_id] = assigned

cur.executemany(
    "INSERT INTO IotDevices(fieldId,deviceType,deviceSerialNumber,firmwareVersion,"
    "devicePublicKey,lastSeen,deviceStatus) VALUES(?,?,?,?,?,?,?)",
    devices
)
print(f" {len(devices)} capteurs insérés.")

# ─────────────────────────────────────────
# SENSOR READINGS  — 90 days, every 30 min
# ─────────────────────────────────────────
# moisture state per device (mean-reverting simulation)
moisture_state: dict[int, float] = {}

readings = []
INTERVAL_MINUTES = 30
steps = 90 * 24 * 2   # 4320 steps per device

# Per-field moisture target (dryer or wetter soil type)
moisture_targets = {
    "Loamy": 32, "Sandy Loam": 24, "Clay Loam": 35,
    "Silty": 38, "Clay": 40, "Sandy": 18
}

for field_id in range(1, 19):
    soil = fields_data[field_id - 1][3]
    m_target = moisture_targets.get(soil, 30)

    for (dev_idx, metric, unit) in field_devices[field_id]:
        device_db_id = dev_idx  # 1-indexed matches autoincrement
        if metric == "soil_moisture":
            moisture_state[device_db_id] = m_target + random.uniform(-5, 5)

        for step in range(steps):
            ts = START + timedelta(minutes=step * INTERVAL_MINUTES)
            day_offset = (ts - START).days
            hour = ts.hour

            if metric == "soil_moisture":
                # Mean-reverting + diurnal dip (evaporation mid-day)
                diurnal = -3 * math.sin(math.pi * hour / 12) if 6 <= hour <= 18 else 0
                prev = moisture_state[device_db_id]
                val = next_moisture(prev, target=m_target + diurnal, noise=1.5)
                moisture_state[device_db_id] = val
                val = round(val, 2)
                anom = 1 if val < 10 or val > 70 else 0

            elif metric == "temperature":
                base_t = season_temp(day_offset, base=27, amplitude=4)
                diurnal_t = 6 * math.sin(math.pi * (hour - 6) / 12) if 6 <= hour <= 18 else -2
                val = round(clamp(base_t + diurnal_t + random.gauss(0, 1.5), 10, 48), 2)
                anom = 1 if val > 40 or val < 12 else 0

            elif metric == "soil_ph":
                # Slow drift with occasional spike
                val = round(clamp(random.gauss(6.3, 0.25) + 0.1 * math.sin(day_offset / 15), 4.5, 8.5), 2)
                anom = 1 if val < 5.2 or val > 7.8 else 0

            else:  # humidity
                base_h = 65 - 10 * math.sin(2 * math.pi * day_offset / 90)
                val = round(clamp(base_h + random.gauss(0, 8), 20, 100), 2)
                anom = 0

            readings.append((device_db_id, metric, val, unit,
                              ts.strftime("%Y-%m-%d %H:%M:%S"), anom))

# Batch insert in chunks of 50k
CHUNK = 50_000
for i in range(0, len(readings), CHUNK):
    cur.executemany(
        "INSERT INTO SensorReadings(deviceId,metricType,value,unit,timestamp,anomalyFlag)"
        " VALUES(?,?,?,?,?,?)",
        readings[i:i+CHUNK]
    )
    conn.commit()
    print(f"   … {min(i+CHUNK, len(readings)):,} / {len(readings):,} lectures insérées")

print(f" {len(readings):,} lectures de capteurs insérées.")

# ─────────────────────────────────────────
# IRRIGATION EVENTS  — triggered when moisture drops low
# ─────────────────────────────────────────
irrig_rows = []
for field_id in range(1, 19):
    area = areas[field_id - 1]
    # One irrigation check per day
    for day in range(90):
        ts_base = START + timedelta(days=day, hours=5, minutes=random.randint(0, 30))
        # 40% base probability, higher in dry months (days 0-30)
        dry_boost = 0.2 if day < 30 else 0
        if random.random() < 0.40 + dry_boost:
            duration_min = random.randint(45, 150)
            volume = round(area * random.uniform(1.8, 3.5), 2)
            automated = 1 if random.random() > 0.25 else 0
            end_ts = ts_base + timedelta(minutes=duration_min)
            irrig_rows.append((
                field_id,
                ts_base.strftime("%Y-%m-%d %H:%M:%S"),
                end_ts.strftime("%Y-%m-%d %H:%M:%S"),
                volume, automated
            ))

cur.executemany(
    "INSERT INTO IrrigationEvents(fieldId,irrigStartTime,irrigEndTime,waterVolume_m3,irrigAutomated)"
    " VALUES(?,?,?,?,?)",
    irrig_rows
)
print(f" {len(irrig_rows)} événements d'irrigation insérés.")

# ─────────────────────────────────────────
# ALERTS  — generated from anomalies + business rules
# ─────────────────────────────────────────
alert_templates = [
    ("Low Soil Moisture",   "High",     "Moisture dropped below 15% on {field}"),
    ("High Temperature",    "Medium",   "Temperature exceeded 38°C on {field}"),
    ("pH Imbalance",        "High",     "Soil pH outside 5.2–7.8 range on {field}"),
    ("Device Offline",      "Critical", "Sensor offline for >6h on {field}"),
    ("Irrigation Failure",  "Critical", "Automated irrigation did not trigger on {field}"),
    ("High Humidity",       "Low",      "Humidity above 90% — fungal risk on {field}"),
    ("Frost Risk",          "Medium",   "Temperature below 14°C detected on {field}"),
    ("Nutrient Deficiency", "Medium",   "pH trend suggests nutrient lockout on {field}"),
]

alert_rows = []
for field_id in range(1, 19):
    field_name = field_names[field_id - 1]
    n_alerts = random.randint(3, 9)
    for _ in range(n_alerts):
        tpl = random.choice(alert_templates)
        days_ago = random.randint(0, 89)
        ts = START + timedelta(days=days_ago, hours=random.randint(0, 23))
        resolved = 1 if days_ago > 3 else (1 if random.random() > 0.4 else 0)
        alert_rows.append((
            field_id,
            tpl[0],
            tpl[1],
            tpl[2].format(field=field_name),
            ts.strftime("%Y-%m-%d %H:%M:%S"),
            resolved
        ))

cur.executemany(
    "INSERT INTO Alerts(fieldId,alertType,severity,message,createdAt,resolved) VALUES(?,?,?,?,?,?)",
    alert_rows
)
print(f" {len(alert_rows)} alertes insérées.")

# ─────────────────────────────────────────
# WEATHER READINGS  — daily per farm, 90 days
# ─────────────────────────────────────────
weather_rows = []
for farm_id in range(1, 7):
    for day in range(90):
        ts = START + timedelta(days=day, hours=6)
        day_offset = day
        temp = round(season_temp(day_offset, base=28, amplitude=4) + random.gauss(0, 1.5), 2)
        humidity = round(clamp(65 + random.gauss(0, 10), 25, 99), 2)
        rainfall = round(max(0, random.gauss(0, 4)) if random.random() < 0.25 else 0, 2)
        wind = round(clamp(random.gauss(12, 5), 0, 60), 2)
        weather_rows.append((farm_id, ts.strftime("%Y-%m-%d %H:%M:%S"), temp, humidity, rainfall, wind))

cur.executemany(
    "INSERT INTO WeatherReadings(farmId,timestamp,temperature_c,humidity_pct,rainfall_mm,windSpeed_kmh)"
    " VALUES(?,?,?,?,?,?)",
    weather_rows
)
print(f" {len(weather_rows)} relevés météo insérés.")

