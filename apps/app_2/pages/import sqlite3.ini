CREATE TABLE Users (
    userId       INTEGER PRIMARY KEY AUTOINCREMENT,
    userName     TEXT NOT NULL,
    userEmail    TEXT UNIQUE NOT NULL,
    userRole     TEXT NOT NULL CHECK(userRole IN (
                    'Farm Manager','Agronomist','IoT Engineer',
