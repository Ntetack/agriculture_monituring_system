    message   TEXT NOT NULL,
    createdAt DATETIME DEFAULT CURRENT_TIMESTAMP,
    resolved  INTEGER DEFAULT 0
);

CREATE TABLE WeatherReadings (
    weatherId      INTEGER PRIMARY KEY AUTOINCREMENT,
    farmId         INTEGER NOT NULL REFERENCES Farms(farmId),
    timestamp      DATETIME DEFAULT CURRENT_TIMESTAMP,
    temperature_c  REAL,
    humidity_pct   REAL,
    rainfall_mm    REAL,
    windSpeed_kmh  REAL
);
""")

print(" Tables créées.")

# ─────────────────────────────────────────
# HELPERS
# ─────────────────────────────────────────
random.seed(42)

def dt(base: datetime, **kw) -> str:
    return (base + timedelta(**kw)).strftime("%Y-%m-%d %H:%M:%S")

def d(base: datetime, **kw) -> str:
    return (base + timedelta(**kw)).strftime("%Y-%m-%d")

def clamp(v, lo, hi):
    return max(lo, min(hi, v))

# Seasonal temperature signal: sine wave over 90 days
def season_temp(day_offset, base=28, amplitude=5):
    return base + amplitude * math.sin(2 * math.pi * day_offset / 90)

# Soil moisture: slow mean-reverting process with irrigation bumps
def next_moisture(prev, target=30, noise=3, drift=0.08):
    return clamp(prev + drift * (target - prev) + random.gauss(0, noise), 5, 95)

NOW = datetime(2026, 2, 27, 10, 0, 0)
START = NOW - timedelta(days=89)   # 90 days of history

